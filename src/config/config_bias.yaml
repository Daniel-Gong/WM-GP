experiment:
  set_sizes: [1, 2, 4, 6]
  n_trials: 200
  random_seed: 42
  
data:
  n_samples_per_item: 1000
  loc_std: 20.0
  color_std: 20.0
  loc_encoding_noise_std: 20.0
  color_encoding_noise_std: 0.0

model:
  inducing_grid_size: 10
  maint_grid_size: 30
  loc_lengthscale: 10.0
  color_lengthscale: 10.0
  learn_inducing_locations: true

likelihood:
  noise_variance: 0.000001

training:
  encoding_epochs: 100
  maintenance_epochs: 100
  cue_start_epoch: 50              # Start applying cue
  encoding_lr: 0.05
  maintenance_lr: 0.01
  beta: 1

attention:
  spatial_std: 20.0
  attended_gain: 2.0

normalization:
  loc_pool_width: 60.0      # spatial pool width (degrees) — must reach the distractor
  color_pool_width: 30.0    # color-axis smoothing width (degrees) — wide enough that the
                            # distractor's pool peak spreads to the target region only when
                            # colors are similar (creates the inverted-U pattern)
  baseline_frac: 0.5        # semi-saturation constant as fraction of peak response

output:
  log_every: 10
  save_animations: true
  save_plots: true

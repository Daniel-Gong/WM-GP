experiment:
  set_sizes: [1, 2, 4, 6]
  n_trials: 200
  random_seed: 42
  
data:
  n_samples_per_item: 1000
  loc_std: 20.0
  color_std: 20.0
  loc_encoding_noise_std: 0.0
  color_encoding_noise_std: 0.0

model:
  inducing_grid_size: 10
  maint_grid_size: 30
  loc_lengthscale: 10.0
  color_lengthscale: 10.0
  learn_inducing_locations: true

likelihood:
  noise_variance: 0.0001

training:
  encoding_epochs: 100
  maintenance_epochs: 100
  cue_start_epoch: 50              # Start applying cue
  encoding_lr: 0.05
  maintenance_lr: 0.015
  beta: 5

attention:
  spatial_std: 20.0
  attended_gain: 20.0

output:
  log_every: 10
  save_animations: true
  save_plots: true
